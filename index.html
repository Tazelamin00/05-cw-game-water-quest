<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <div class="confetti-layer" aria-hidden="true"></div>
    <header class="game-header">
      <img class="brand-logo" src="img/cw_logo_horizontal.png" alt="charity: water logo">
      <div class="title-block">
        <p class="eyebrow">Water Quest</p>
        <h1>Collect clean water before time runs out.</h1>
      </div>
    </header>
    <p class="game-instructions">Click as many jerry cans as you can in 30 seconds. Reach 20 points to win, and avoid the bombs.</p>
    <div class="stats">
      <p>Score: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>
    <div id="achievements" class="achievement" aria-live="polite">Press start to begin your 30-second round.</div>
    <div class="game-grid"></div>
    <div class="controls">
      <button id="start-game">Start Game</button>
      <button id="reset-game" type="button">Reset Round</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
